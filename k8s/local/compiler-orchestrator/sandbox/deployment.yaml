apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: compiler-orchestrator-sandbox-label
  name: compiler-orchestrator-sandbox-deployment
  namespace: chicmoz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compiler-orchestrator-sandbox-label
  template:
    metadata:
      labels:
        app: compiler-orchestrator-sandbox-label
    spec:
      serviceAccountName: compiler-orchestrator
      containers:
        - image: compiler-orchestrator:latest
          name: compiler-orchestrator
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 256Mi
              cpu: 250m
          env:
            - name: INSTANCE_NAME
              value: "sandbox-compiler-orchestrator"
            - name: L2_NETWORK_ID
              value: "SANDBOX"
            - name: K8S_NAMESPACE
              value: "chicmoz"
            - name: COMPILER_IMAGE
              value: "contract-compiler:4.0.3"
            - name: MAX_CONCURRENT_JOBS
              value: "3"
            - name: JOB_TIMEOUT_SECONDS
              value: "300"
status: {}
