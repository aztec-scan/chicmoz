apiVersion: skaffold/v4beta6
kind: Config
build:
  artifacts:
    - image: explorer-ui-v2-testnet
      context: ../../../
      docker:
        dockerfile: services/explorer-ui-v2/Dockerfile
        buildArgs:
          NODE_ENV: "development"
          VITE_L2_NETWORK_ID: "TESTNET"
          VITE_CHICMOZ_ALL_UI_URLS: "Sandbox|http://sandbox.chicmoz.localhost,Testnet|http://v2.testnet.chicmoz.localhost"
          VITE_API_URL: "http://api.testnet.chicmoz.localhost:80/v1"
          VITE_API_KEY: "dev-api-key"
          VITE_WS_URL: "ws://ws.testnet.chicmoz.localhost:80"
          VITE_DISCORD_URL: "https://discord.gg/xnw7fVXB7m"
          VITE_GITHUB_URL: "https://github.com/aztec-scan/chicmoz"
          VITE_X_URL: "https://x.com/aztecscan"
          VITE_VERSION_STRING: "development-testnet-v2"
deploy:
  kubectl:
    flags:
      apply: ["--force"]
manifests:
  rawYaml:
    - ./testnet/service.yaml
    - ./testnet/httproute.yaml
    - ./testnet/deployment.yaml
