apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: explorer-api-testnet
  namespace: chicmoz
  labels:
    app.kubernetes.io/name: explorer-api
    app.kubernetes.io/part-of: chicmoz-local
spec:
  parentRefs:
    - name: chicmoz-gateway
      sectionName: api-testnet
    - name: chicmoz-gateway
      sectionName: api-testnet-remote
  hostnames:
    - api.testnet.chicmoz.localhost
    - api.remote.chicmoz.localhost
  rules:
    - matches:
        - path:
            type: RegularExpression
            value: /v1/([^/]+)/(.*)
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: explorer-api-testnet-rewrite
      backendRefs:
        - name: explorer-api-testnet-service
          port: 80
