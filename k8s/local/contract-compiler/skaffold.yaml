apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: contract-compiler-image
build:
  artifacts:
    - image: contract-compiler
      context: ../../../services/event-cannon
      docker:
        dockerfile: Dockerfile.compile-contracts
        buildArgs:
          BASE_AZTEC_IMAGE: "aztecprotocol/aztec:5.0.0-rc.1"
          NARGO_AZTEC_VERSION: "v5.0.0-rc.1"
          DOCKER_DEFAULT_PLATFORM: "linux/amd64"
  tagPolicy:
    customTemplate:
      template: "5.0.0-rc.1"
