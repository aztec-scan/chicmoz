apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: explorer-api-devnet
  namespace: chicmoz-prod
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: explorer-api-devnet
  cors:
    allowOrigins:
      - "https://docs.aztecscan.xyz"
      - "https://devnet.aztecscan.xyz"
      - "https://devnet.beta.aztecscan.xyz"
    allowMethods:
      - GET
      - PUT
      - POST
      - DELETE
      - PATCH
      - OPTIONS
    allowHeaders:
      - DNT
      - Keep-Alive
      - User-Agent
      - X-Requested-With
      - If-Modified-Since
      - Cache-Control
      - Content-Type
      - Range
      - Authorization
      - X-Api-Key
    allowCredentials: true
    maxAge: 24h
  extAuth:
    failOpen: false
    http:
      backendRefs:
        - name: auth-service
          namespace: chicmoz-prod
          port: 80
      path: /_external-auth-envoy
      headersToBackend:
        - x-api-key
        - authorization
    timeout: 5s
