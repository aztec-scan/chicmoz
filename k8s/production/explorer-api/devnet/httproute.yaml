apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: explorer-api-devnet
  namespace: chicmoz-prod
spec:
  parentRefs:
    - name: aztecscan-gateway
      sectionName: api-devnet-http
    - name: aztecscan-gateway
      sectionName: api-devnet-https
    - name: aztecscan-gateway
      sectionName: api-devnet-beta-http
    - name: aztecscan-gateway
      sectionName: api-devnet-beta-https
  hostnames:
    - api.devnet.aztecscan.xyz
    - api.devnet.beta.aztecscan.xyz
  rules:
    - matches:
        - path:
            type: RegularExpression
            value: /v1/([^/]+)/(.*)
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: explorer-api-devnet-rewrite
      backendRefs:
        - name: explorer-api-devnet-service
          port: 80
