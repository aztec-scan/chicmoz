apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: contract-compiler-image-prod-mainnet
build:
  artifacts:
    - image: registry.digitalocean.com/aztlan-containers/contract-compiler-mainnet
      context: services/event-cannon
      docker:
        dockerfile: Dockerfile.compile-contracts
        buildArgs:
          BASE_AZTEC_IMAGE: "aztecprotocol/aztec:4.2.0-aztecnr-rc.2"
          NARGO_AZTEC_VERSION: "v4.2.0-aztecnr-rc.2"
          DOCKER_DEFAULT_PLATFORM: "linux/amd64"
  tagPolicy:
    customTemplate:
      template: "4.2.0-aztecnr-rc.2"
