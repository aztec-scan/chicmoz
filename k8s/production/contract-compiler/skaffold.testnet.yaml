apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: contract-compiler-image-prod-testnet
build:
  artifacts:
    - image: registry.digitalocean.com/aztlan-containers/contract-compiler-testnet
      context: ../../../services/event-cannon
      docker:
        dockerfile: Dockerfile.compile-contracts
        buildArgs:
          BASE_AZTEC_IMAGE: "aztecprotocol/aztec:4.2.0"
          NARGO_AZTEC_VERSION: "v4.2.0"
          DOCKER_DEFAULT_PLATFORM: "linux/amd64"
  tagPolicy:
    customTemplate:
      template: "4.2.0"
