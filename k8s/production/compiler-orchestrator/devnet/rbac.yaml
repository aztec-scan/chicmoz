apiVersion: v1
kind: ServiceAccount
metadata:
  name: compiler-orchestrator-devnet
  namespace: chicmoz-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: compiler-orchestrator-devnet-role
  namespace: chicmoz-prod
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: compiler-orchestrator-devnet-rolebinding
  namespace: chicmoz-prod
subjects:
  - kind: ServiceAccount
    name: compiler-orchestrator-devnet
    namespace: chicmoz-prod
roleRef:
  kind: Role
  name: compiler-orchestrator-devnet-role
  apiGroup: rbac.authorization.k8s.io
