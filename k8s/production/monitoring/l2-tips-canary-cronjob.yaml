apiVersion: batch/v1
kind: CronJob
metadata:
  name: l2-tips-health-canary
  namespace: chicmoz-prod
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 12
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: l2-tips-health-canary
        spec:
          restartPolicy: Never
          containers:
            - name: canary
              image: node:22-alpine
              command:
                - node
                - --input-type=module
                - -e
                - |
                  const targets = [
                    {
                      network: "mainnet",
                      urls: [
                        "https://api.aztecscan.xyz/l2/tips",
                        "https://api.aztecscan.xyz/v1/temporary-api-key/l2/tips",
                      ],
                    },
                    {
                      network: "testnet",
                      urls: [
                        "https://api.testnet.aztecscan.xyz/l2/tips",
                        "https://api.testnet.aztecscan.xyz/v1/temporary-api-key/l2/tips",
                      ],
                    },
                    {
                      network: "devnet",
                      urls: [
                        "https://api.devnet.aztecscan.xyz/l2/tips",
                        "https://api.devnet.aztecscan.xyz/v1/temporary-api-key/l2/tips",
                      ],
                    },
                  ];
                  const staleGraceMs = 120000;
                  const isTipBlock = (value) => value && typeof value === "object" && Number.isSafeInteger(value.number) && typeof value.hash === "string" && value.hash.startsWith("0x");
                  const isCheckpointTip = (value) => value && typeof value === "object" && isTipBlock(value.block) && value.checkpoint && Number.isSafeInteger(value.checkpoint.number) && typeof value.checkpoint.hash === "string" && value.checkpoint.hash.startsWith("0x");
                  const validateShape = (payload) => {
                    if (!payload || typeof payload !== "object") throw new Error("payload is not an object");
                    if (!payload.tips || typeof payload.tips !== "object") throw new Error("payload.tips is missing");
                    for (const key of ["proposed", "checkpointed", "proven", "finalized"]) {
                      const valid = key === "proposed" ? isTipBlock(payload.tips[key]) : isCheckpointTip(payload.tips[key]);
                      if (!valid) throw new Error(`payload.tips.${key} has unexpected shape`);
                    }
                    for (const key of ["observedAt", "stalenessMs", "staleAfterMs"]) {
                      if (!Number.isSafeInteger(payload[key]) || payload[key] < 0) throw new Error(`payload.${key} must be a non-negative integer`);
                    }
                    for (const key of ["stale", "degraded"]) {
                      if (typeof payload[key] !== "boolean") throw new Error(`payload.${key} must be boolean`);
                    }
                  };
                  const failures = [];
                  for (const target of targets) {
                    let deployed = false;
                    for (const url of target.urls) {
                      try {
                        const response = await fetch(url, { signal: AbortSignal.timeout(15000) });
                        if (response.status === 404) {
                          console.log(`${target.network}: ${url} returned 404; treating this path as not deployed yet`);
                          continue;
                        }
                        if (!response.ok) throw new Error(`${target.network}: ${url} returned HTTP ${response.status}`);
                        deployed = true;
                        const payload = await response.json();
                        validateShape(payload);
                        if (payload.stale || payload.stalenessMs > payload.staleAfterMs + staleGraceMs) throw new Error(`${target.network}: ${url} reports stale tips: stalenessMs=${payload.stalenessMs} staleAfterMs=${payload.staleAfterMs}`);
                        if (payload.degraded) throw new Error(`${target.network}: ${url} reports degraded tips: ${payload.degradedReason ?? "unknown reason"}`);
                        if (payload.repeatedDegradedBoundaryMismatch) throw new Error(`${target.network}: ${url} reports repeated boundary mismatch: ${JSON.stringify(payload.repeatedDegradedBoundaryMismatch)}`);
                        console.log(`${target.network}: ${url} tips health is OK`);
                      } catch (error) {
                        failures.push(error instanceof Error ? error.message : String(error));
                      }
                    }
                    if (!deployed) console.log(`${target.network}: no /l2/tips path is deployed yet`);
                  }
                  if (failures.length > 0) throw new Error(`L2 tips health canary failed:\n- ${failures.join("\n- ")}`);
