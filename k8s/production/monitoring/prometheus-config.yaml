apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config-template
  namespace: chicmoz-prod
data:
  prometheus.yml.tmpl: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        cluster: aztecscan-prod
        source: k8s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector.chicmoz-prod.svc.cluster.local:8889"]

      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics.chicmoz-prod.svc.cluster.local:8080"]

      - job_name: kubernetes-services
        kubernetes_sd_configs:
          - role: service
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
            action: replace
            target_label: __scheme__
            regex: (https?)
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: network
            regex: .*(mainnet).*
            replacement: $1
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: network
            regex: .*(testnet).*
            replacement: $1
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: network
            regex: .*(devnet).*
            replacement: $1
          - source_labels: [network]
            action: replace
            target_label: network
            regex: ^$
            replacement: infra

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: network
            regex: .*(mainnet).*
            replacement: $1
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: network
            regex: .*(testnet).*
            replacement: $1
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: network
            regex: .*(devnet).*
            replacement: $1
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: network
            regex: .*(mainnet).*
            replacement: $1
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: network
            regex: .*(testnet).*
            replacement: $1
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: network
            regex: .*(devnet).*
            replacement: $1
          - source_labels: [network]
            action: replace
            target_label: network
            regex: ^$
            replacement: infra

      - job_name: kubernetes-nodes
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics
          - target_label: network
            replacement: infra

      - job_name: kubernetes-nodes-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
          - target_label: network
            replacement: infra

    remote_write:
      - url: __REMOTE_WRITE_URL__
        authorization:
          type: Bearer
          credentials_file: /etc/prometheus/remote-write/REMOTE_WRITE_TOKEN
