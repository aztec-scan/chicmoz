# Primary domain certificates (for when you migrate DNS)
# Mainnet Primary Certificates
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: aztecscan-api-tls-primary
  namespace: chicmoz-prod
spec:
  secretName: aztecscan-api-tls-primary
  issuerRef:
    name: aztecscan-issuer-production
    kind: ClusterIssuer
  dnsNames:
    - api.aztecscan.xyz
    - api.mainnet.aztecscan.xyz
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: aztecscan-ui-tls-primary
  namespace: chicmoz-prod
spec:
