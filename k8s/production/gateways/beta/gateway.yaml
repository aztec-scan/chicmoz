    - name: api-http
      hostname: api.beta.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: api-mainnet-http
      hostname: api.mainnet.beta.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
