apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: aztecscan-gateway
  namespace: chicmoz-prod
spec:
  gatewayClassName: envoy-gateway
  listeners:
    # HTTP Listeners - Primary Mainnet
    - name: api-primary-http
      hostname: api.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: ui-primary-http
      hostname: aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: ws-primary-http
      hostname: ws.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    # HTTP Listeners - Mainnet Subdomains
    - name: api-mainnet-primary-http
      hostname: api.mainnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: ui-mainnet-primary-http
      hostname: mainnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: ws-mainnet-primary-http
      hostname: ws.mainnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    # HTTP Listeners - v1 Mainnet UI
    - name: ui-v1-http
      hostname: v1.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: ui-v1-mainnet-http
      hostname: v1.mainnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    # HTTP Listeners - Primary Testnet
    - name: api-testnet-primary-http
      hostname: api.testnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: ui-testnet-primary-http
      hostname: testnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: ws-testnet-primary-http
      hostname: ws.testnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    # HTTP Listeners - Devnet
    - name: api-devnet-http
      hostname: api.devnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: ui-devnet-http
      hostname: devnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: ws-devnet-http
      hostname: ws.devnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    # HTTP Listeners - v1 Testnet UI
    - name: ui-v1-testnet-http
      hostname: v1.testnet.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    # HTTP Listeners - Swagger
    - name: swagger-http
      hostname: docs.aztecscan.xyz
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS Listeners - Primary Mainnet
    - name: api-primary-https
      hostname: api.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-api-tls-primary
      allowedRoutes:
        namespaces:
          from: Same
    - name: ui-primary-https
      hostname: aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ui-tls-primary
      allowedRoutes:
        namespaces:
          from: Same
    - name: ws-primary-https
      hostname: ws.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ws-tls-primary
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS Listeners - Mainnet Subdomains
    - name: api-mainnet-primary-https
      hostname: api.mainnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-api-tls-primary
      allowedRoutes:
        namespaces:
          from: Same
    - name: ui-mainnet-primary-https
      hostname: mainnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ui-tls-primary
      allowedRoutes:
        namespaces:
          from: Same
    - name: ws-mainnet-primary-https
      hostname: ws.mainnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ws-tls-primary
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS Listeners - v1 Mainnet UI
