      hostname: v1.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ui-v1-tls-primary
      allowedRoutes:
        namespaces:
          from: Same
    - name: ui-v1-mainnet-https
      hostname: v1.mainnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ui-v1-tls-primary
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS Listeners - Primary Testnet
    - name: api-testnet-primary-https
      hostname: api.testnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-api-tls-testnet
      allowedRoutes:
        namespaces:
          from: Same
    - name: ui-testnet-primary-https
      hostname: testnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ui-tls-testnet
      allowedRoutes:
        namespaces:
          from: Same
    - name: ws-testnet-primary-https
      hostname: ws.testnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ws-tls-testnet
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS Listeners - Devnet
    - name: api-devnet-https
      hostname: api.devnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-api-tls-devnet
      allowedRoutes:
        namespaces:
          from: Same
    - name: ui-devnet-https
      hostname: devnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ui-tls-devnet
      allowedRoutes:
        namespaces:
          from: Same
    - name: ws-devnet-https
      hostname: ws.devnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ws-tls-devnet
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS Listeners - v1 Testnet UI
    - name: ui-v1-testnet-https
      hostname: v1.testnet.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: aztecscan-ui-v1-tls-testnet
      allowedRoutes:
        namespaces:
          from: Same
    # HTTPS Listeners - Swagger
    - name: swagger-https
      hostname: docs.aztecscan.xyz
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
