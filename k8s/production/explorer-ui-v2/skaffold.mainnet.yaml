apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: explorer-ui-v2-mainnet
build:
  artifacts:
    - image: registry.digitalocean.com/aztlan-containers/explorer-ui-v2
      context: ../../..
      docker:
        dockerfile: services/explorer-ui-v2/Dockerfile
        buildArgs:
          NODE_ENV: "production"
          VITE_L2_NETWORK_ID: "MAINNET"
          VITE_CHICMOZ_ALL_UI_URLS: "Mainnet|https://aztecscan.xyz,Testnet|https://testnet.aztecscan.xyz,Devnet|https://devnet.aztecscan.xyz"
          VITE_API_URL: "https://api.aztecscan.xyz/v1"
          VITE_API_KEY: "temporary-api-key"
          VITE_WS_URL: "wss://ws.aztecscan.xyz"
          VITE_DISCORD_URL: "https://discord.gg/xnw7fVXB7m"
          VITE_GITHUB_URL: "https://github.com/aztec-scan/chicmoz"
          VITE_X_URL: "https://x.com/aztecscan"
          VITE_VERSION_STRING: "{{.VERSION_STRING}}"
deploy:
  kubectl:
    flags:
      apply: ["--force"]
manifests:
  rawYaml:
    - ./mainnet/*.yaml
