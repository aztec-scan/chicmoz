apiVersion: apps/v1
kind: Deployment
metadata:
  name: explorer-api
  labels:
    app: explorer-api
    app.kubernetes.io/name: explorer-api
    app.kubernetes.io/part-of: chicmoz-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: explorer-api
  template:
    metadata:
      labels:
        app: explorer-api
    spec:
      imagePullSecrets:
        - name: registry-aztlan-containers
      initContainers:
        - name: run-migrations
          image: registry.digitalocean.com/aztlan-containers/explorer-api
          command: ["yarn", "run", "migrate"]
          envFrom:
            - configMapRef:
                name: postgres-config-global
            - configMapRef:
                name: postgres-config-explorer-api # nameSuffix appends network suffix → postgres-config-explorer-api-{network}
          env:
            - name: NODE_ENV
              value: "production"
            - name: TOTAL_DB_RESET
              value: "false"
      containers:
        - name: explorer-api
          image: registry.digitalocean.com/aztlan-containers/explorer-api
          imagePullPolicy: Always
          resources:
            limits:
              memory: 1024Mi
              cpu: 500m
          ports:
            - name: http-app-port
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: postgres-config-global
            - configMapRef:
                name: postgres-config-explorer-api # nameSuffix appends network suffix → postgres-config-explorer-api-{network}
          env:
            - name: NODE_ENV
              value: "production"
            - name: PUBLIC_API_KEY
              value: "temporary-api-key"
          readinessProbe:
            httpGet:
              # /health is a strict composite health check (DB + CACHE + MB) and
              # can return 500 even when the HTTP server and DB are usable.
              # For readiness we only need the pod to accept traffic.
              path: /open-api-specification
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
