apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: chicmoz-prod
nameSuffix: -testnet

resources:
  - ../../base
  - httproute.yaml
  - postgres-config.yaml
  - http-filter.yaml
  - securitypolicy.yaml

images:
  - name: registry.digitalocean.com/aztlan-containers/explorer-api
    newName: registry.digitalocean.com/aztlan-containers/explorer-api-testnet
    newTag: latest

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: explorer-api
      spec:
        template:
          spec:
            containers:
              - name: explorer-api
                env:
                  - name: INSTANCE_NAME
                    value: "testnet_explorer-api"
                  - name: L2_NETWORK_ID
                    value: "TESTNET"
            initContainers:
              - name: run-migrations
                env:
                  - name: INSTANCE_NAME
                    value: "testnet_explorer-api"
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: explorer-api
      spec:
        selector:
          matchLabels:
            app: explorer-api
            network: testnet
        template:
          metadata:
            labels:
              app: explorer-api
              network: testnet
  - patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: explorer-api
      spec:
        selector:
          app: explorer-api
          network: testnet
