apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: explorer-api-rewrite # nameSuffix appends -devnet → explorer-api-rewrite-devnet
  namespace: chicmoz-prod
spec:
  urlRewrite:
    path:
      type: ReplaceRegexMatch
      replaceRegexMatch:
        pattern: ^/v1/[^/]+/(.*)$
        substitution: '/\1'
