apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-event-publisher
  labels:
    app: websocket-event-publisher
    app.kubernetes.io/name: websocket-event-publisher
    app.kubernetes.io/part-of: chicmoz-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket-event-publisher
  template:
    metadata:
      labels:
        app: websocket-event-publisher
    spec:
      imagePullSecrets:
        - name: registry-aztlan-containers
      containers:
        - name: websocket-event-publisher
          image: registry.digitalocean.com/aztlan-containers/websocket-event-publisher
          imagePullPolicy: Always
          resources:
            limits:
              memory: 300Mi
              cpu: 500m
          ports:
            - name: websocket-port
              containerPort: 3000
              protocol: TCP
            - name: health-port
              containerPort: 3001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
