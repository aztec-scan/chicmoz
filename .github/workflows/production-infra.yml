name: CI/CD Production Infra

on:
  push:
    branches:
      - production-testnet
      - production
      - production-devnet
    paths:
      - "k8s/production/monitoring/**"
      - "k8s/production/common/skaffold.infra.yaml"
  workflow_dispatch:

env:
  CLUSTER_NAME: aztecscan-prod

jobs:
  deploy-production-monitoring:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify Slack deployment started
        uses: ./.github/actions/slack-deploy-notify
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          service: production-infra
          network: shared
          status: started

      - name: Configure doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Install kubectl
        run: |
          curl -Lo kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      - name: Apply monitoring and canary manifests
        run: |
          manifests=(
            k8s/production/monitoring/prometheus-rbac.yaml
            k8s/production/monitoring/kube-state-metrics.yaml
            k8s/production/monitoring/prometheus-config.yaml
            k8s/production/monitoring/prometheus-pvc.yaml
            k8s/production/monitoring/prometheus-deployment.yaml
            k8s/production/monitoring/prometheus-service.yaml
            k8s/production/monitoring/l2-tips-canary-cronjob.yaml
          )

          applied_any=false
          for manifest in "${manifests[@]}"; do
            if [ -f "$manifest" ]; then
              kubectl apply -f "$manifest"
              applied_any=true
            else
              echo "Skipping missing manifest: $manifest"
            fi
          done

          if [ "$applied_any" != "true" ]; then
            echo "No production monitoring manifests were found in this branch." >&2
            exit 1
          fi

      - name: Restart Prometheus to load config changes
        run: |
          if kubectl get deployment/prometheus -n chicmoz-prod >/dev/null 2>&1; then
            kubectl rollout restart deployment/prometheus -n chicmoz-prod
          else
            echo "Prometheus deployment is not present; skipping restart."
          fi

      - name: Wait for Prometheus rollout
        run: |
          if kubectl get deployment/prometheus -n chicmoz-prod >/dev/null 2>&1; then
            kubectl rollout status deployment/prometheus -n chicmoz-prod --timeout=300s
          else
            echo "Prometheus deployment is not present; skipping rollout wait."
          fi

      - name: Notify Slack deployment finished
        if: always()
        uses: ./.github/actions/slack-deploy-notify
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          service: production-infra
          network: shared
          status: ${{ job.status }}
