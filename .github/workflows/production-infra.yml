name: CI/CD Production Infra

on:
  push:
    branches:
      - production-testnet
      - production
      - production-devnet
    paths:
      - "k8s/production/monitoring/**"
      - "k8s/production/common/skaffold.infra.yaml"
  workflow_dispatch:

env:
  CLUSTER_NAME: aztecscan-prod

jobs:
  deploy-production-monitoring:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify Slack deployment started
        uses: ./.github/actions/slack-deploy-notify
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          service: production-infra
          network: shared
          status: started

      - name: Configure doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Install kubectl
        run: |
          curl -Lo kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      - name: Apply monitoring and canary manifests
        run: |
          kubectl apply -f k8s/production/monitoring/prometheus-rbac.yaml
          kubectl apply -f k8s/production/monitoring/kube-state-metrics.yaml
          kubectl apply -f k8s/production/monitoring/prometheus-config.yaml
          kubectl apply -f k8s/production/monitoring/prometheus-pvc.yaml
          kubectl apply -f k8s/production/monitoring/prometheus-deployment.yaml
          kubectl apply -f k8s/production/monitoring/prometheus-service.yaml
          kubectl apply -f k8s/production/monitoring/l2-tips-canary-cronjob.yaml

      - name: Restart Prometheus to load config changes
        run: kubectl rollout restart deployment/prometheus -n chicmoz-prod

      - name: Wait for Prometheus rollout
        run: kubectl rollout status deployment/prometheus -n chicmoz-prod --timeout=300s

      - name: Notify Slack deployment finished
        if: always()
        uses: ./.github/actions/slack-deploy-notify
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          service: production-infra
          network: shared
          status: ${{ job.status }}
